<ion-menu side="start" menuId="primeiro" class="my-custom-menu" contentId="principal">
  <ion-header>
    <ion-toolbar color="danger">
      <ion-title>Menu</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-list>
      <ion-menu-toggle>
        <ion-item   detail *ngFor="let c of componentes | async" [routerLink]="c.link">
         <ion-icon [name]="c.icone" slot="start"></ion-icon>
         <ion-label>{{c.nome}}</ion-label>
       </ion-item> 
      </ion-menu-toggle>
     </ion-list>
   
  </ion-content>
</ion-menu>
